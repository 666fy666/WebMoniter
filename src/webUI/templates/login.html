<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - WebMoniter</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/css/style.css?v=4">
    <script>
        (function() {
            var savedTheme = localStorage.getItem('theme');
            var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
</head>
<body class="login-body">
    <!-- 版本更新提示横幅 -->
    <div id="updateBanner" class="login-update-banner">
        <div class="update-banner-content">
            <span class="update-banner-icon">🎉</span>
            <span class="update-banner-text">
                发现新版本 <strong id="latestVersion"></strong>！
                <a id="releasesLink" href="#" target="_blank">前往更新</a>
            </span>
        </div>
        <button id="dismissUpdateBanner" class="update-banner-close" title="关闭">&times;</button>
    </div>

    <div class="login-container">
        <div class="login-box">
            <div style="text-align: center;">
                <div class="login-brand-icon">
                    <img src="/static/favicon.svg" alt="WebMoniter" width="48" height="48">
                </div>
            </div>
            <h1>WebMoniter</h1>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" required autocomplete="username" placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <div class="password-input-wrap">
                        <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="请输入密码">
                        <button type="button" class="password-toggle" id="passwordToggle" aria-label="显示密码">👁</button>
                    </div>
                </div>
                <div id="errorMessage" class="error-message"></div>
                <button type="submit" class="btn btn-primary login-submit">
                    登录系统
                </button>
            </form>
            <p class="login-tagline">多平台监控 · 签到 · 推送 · 定时任务</p>
            <div class="login-version-info">
                <a id="currentVersion" href="#" target="_blank">加载中...</a>
            </div>
        </div>
    </div>
    <button id="themeToggleBtn" class="btn btn-secondary theme-toggle-fab" aria-label="切换主题">
        <span id="themeIcon" style="font-size: 18px;">☀️</span>
    </button>
    <script src="/static/js/common.js?v=2"></script>
    <script src="/static/js/login.js?v=2"></script>
</body>
</html>
