<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Web任务系统</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <style>
        html, body.login-body {
            min-height: 100%;
            background: linear-gradient(135deg, #34d399 0%, #38bdf8 100%);
        }
        [data-theme="dark"] body.login-body {
            background: linear-gradient(135deg, #10b981 0%, #0284c7 100%);
        }
    </style>
    <link rel="stylesheet" href="/static/css/style.css?v=13">
    <script>
        (function() {
            var savedTheme = localStorage.getItem('theme');
            var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
</head>
<body class="login-body">
    <!-- 版本更新提示横幅 -->
    <div id="updateBanner" class="login-update-banner">
        <div class="update-banner-content">
            <span class="update-banner-icon">🎉</span>
            <span class="update-banner-text">
                发现新版本 <strong id="latestVersion"></strong>！
                <a id="releasesLink" href="#" target="_blank">前往更新</a>
            </span>
        </div>
        <button id="dismissUpdateBanner" class="update-banner-close" title="关闭">&times;</button>
    </div>

    <div class="login-container">
        <div class="login-box">
            <div style="text-align: center; margin-bottom: 8px;">
                <span style="font-size: 48px;">🔮</span>
            </div>
            <h1>Web任务系统</h1>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" required autocomplete="username" placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="请输入密码">
                </div>
                <div id="errorMessage" class="error-message"></div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px; font-size: 16px;">
                    登录系统
                </button>
            </form>
            <div style="text-align: center; margin-top: 24px; color: var(--text-muted); font-size: 13px;">
                多平台Web任务系统，支持监控、签到、推送
            </div>
            <!-- 版本信息 -->
            <div class="login-version-info">
                <a id="currentVersion" href="#" target="_blank">加载中...</a>
            </div>
        </div>
    </div>
    <button id="themeToggleBtn" class="btn btn-secondary" style="position: fixed; top: 20px; right: 20px; z-index: 1000; padding: 10px; border-radius: 50%; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;" aria-label="切换主题">
        <span id="themeIcon" style="font-size: 18px;">☀️</span>
    </button>
    <script src="/static/js/common.js?v=7"></script>
    <script src="/static/js/login.js?v=1"></script>
</body>
</html>
