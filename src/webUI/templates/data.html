{% extends "base.html" %}
{% block content %}
<div class="tabs-scroll-wrap">
                <div class="tabs">
                    <button class="tab-btn active" data-table="weibo">📱 微博数据</button>
                    <button class="tab-btn" data-table="huya">🐯 虎牙数据</button>
                    <button class="tab-btn" data-table="bilibili_live">📺 哔哩哔哩直播</button>
                    <button class="tab-btn" data-table="bilibili_dynamic">📺 哔哩哔哩动态</button>
                    <button class="tab-btn" data-table="douyin">🎬 抖音直播</button>
                    <button class="tab-btn" data-table="douyu">🐟 斗鱼直播</button>
                    <button class="tab-btn" data-table="xhs">📕 小红书数据</button>
                </div>
            </div>
            <div class="card fade-in">
                <div class="card-header">
                    <h2 id="tableTitle">📱 微博数据</h2>
                    <div class="card-actions">
                        <button id="refreshBtn" class="btn btn-secondary">
                            <span>🔄</span>
                            刷新
                        </button>
                    </div>
                </div>
                <div class="card-body">
                    <div id="dataTableContainer" class="table-container">
                        <div class="loading">加载中...</div>
                    </div>
                    <div id="pagination" class="pagination"></div>
                </div>
            </div>
{% endblock %}
{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<script src="/static/js/data.js?v=8"></script>
{% endblock %}
