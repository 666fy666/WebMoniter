{% extends "base.html" %}
{% block body_class %} class="page-logs"{% endblock %}
{% block content %}
<div class="card fade-in">
                <div class="card-header">
                    <h2>📋 今日日志</h2>
                    <div class="card-actions logs-toolbar">
                        <label class="logs-toolbar-label">
                            <span>日志来源:</span>
                            <select id="logSourceSelect" class="form-input">
                                <option value="">📋 今日总日志</option>
                                <!-- 任务选项由 JS 动态填充 -->
                            </select>
                        </label>
                        <label class="logs-toolbar-checkbox">
                            <input type="checkbox" id="autoScroll" checked>
                            <span>自动滚动</span>
                        </label>
                        <button id="refreshLogsBtn" class="btn btn-secondary">
                            <span>🔄</span>
                            刷新
                        </button>
                        <button id="clearLogsBtn" class="btn btn-secondary">
                            <span>🗑️</span>
                            清空显示
                        </button>
                    </div>
                </div>
                <div class="card-body">
                    <div id="logsContainer" class="logs-container">
                        <div class="loading">加载中...</div>
                    </div>
                </div>
            </div>
{% endblock %}
{% block scripts %}
<script src="/static/js/logs.js?v=2"></script>
{% endblock %}
