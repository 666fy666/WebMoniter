<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日志查看 - Web任务系统</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/css/style.css?v=14">
    <script>
        (function() {
            var savedTheme = localStorage.getItem('theme');
            var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
</head>
<body class="page-logs">
    <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="菜单">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
    </button>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="/config" class="sidebar-brand" title="WebMoniter">
                <img src="/static/favicon.svg" alt="" class="sidebar-logo" width="36" height="36">
                <div class="sidebar-brand-text">
                    <span class="sidebar-title">WebMoniter</span>
                    <span class="sidebar-tagline">多平台监控</span>
                </div>
            </a>
        </div>
        <nav class="sidebar-nav">
            <a href="/config" class="nav-item">
                <span class="nav-icon">⚙️</span>
                <span class="nav-text">配置管理</span>
            </a>
            <a href="/tasks" class="nav-item">
                <span class="nav-icon">📋</span>
                <span class="nav-text">任务管理</span>
            </a>
            <a href="/data" class="nav-item">
                <span class="nav-icon">📊</span>
                <span class="nav-text">数据展示</span>
            </a>
            <a href="/logs" class="nav-item active">
                <span class="nav-icon">📝</span>
                <span class="nav-text">日志查看</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <button id="themeToggleBtn" class="btn btn-secondary">
                <span id="themeIcon">☀️</span>
                切换主题
            </button>
            <button id="changePasswordBtn" class="btn btn-secondary">
                <span>🔐</span>
                修改密码
            </button>
            <button id="logoutBtn" class="btn btn-secondary">
                <span>🚪</span>
                退出登录
            </button>
        </div>
        <div class="version-info">
            <a id="currentVersion" href="#" target="_blank">加载中...</a>
        </div>
    </div>

    <!-- 修改密码模态框 -->
    <div id="changePasswordModal" class="modal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3>修改密码</h3>
                <button class="modal-close" id="closePasswordModal">&times;</button>
            </div>
            <form id="changePasswordForm">
                <div class="modal-body">
                    <div class="form-group">
                        <label for="oldPassword">当前密码</label>
                        <input type="password" id="oldPassword" name="old_password" required placeholder="请输入当前密码">
                    </div>
                    <div class="form-group">
                        <label for="newPassword">新密码</label>
                        <input type="password" id="newPassword" name="new_password" required placeholder="请输入新密码（至少3个字符）">
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">确认新密码</label>
                        <input type="password" id="confirmPassword" name="confirm_password" required placeholder="请再次输入新密码">
                    </div>
                    <div id="passwordMessage" class="password-message"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="cancelPasswordChange">取消</button>
                    <button type="submit" class="btn btn-primary">确认修改</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 版本更新提示横幅 -->
    <div id="updateBanner" class="update-banner">
        <div class="update-banner-content">
            <span class="update-banner-icon">🎉</span>
            <span class="update-banner-text">
                发现新版本 <strong id="latestVersion"></strong>！
                <a id="releasesLink" href="#" target="_blank">前往更新</a>
            </span>
        </div>
        <button id="dismissUpdateBanner" class="update-banner-close" title="关闭">&times;</button>
    </div>

    <div class="main-content">
        <div class="content-header">
            <h1>日志查看</h1>
            <p class="subtitle">实时查看当天日志内容</p>
        </div>
        <div class="content-body">
            <div class="card fade-in">
                <div class="card-header">
                    <h2>📋 今日日志</h2>
                    <div class="card-actions logs-toolbar">
                        <label class="logs-toolbar-label">
                            <span>日志来源:</span>
                            <select id="logSourceSelect" class="form-input">
                                <option value="">📋 今日总日志</option>
                                <!-- 任务选项由 JS 动态填充 -->
                            </select>
                        </label>
                        <label class="logs-toolbar-checkbox">
                            <input type="checkbox" id="autoScroll" checked>
                            <span>自动滚动</span>
                        </label>
                        <button id="refreshLogsBtn" class="btn btn-secondary">
                            <span>🔄</span>
                            刷新
                        </button>
                        <button id="clearLogsBtn" class="btn btn-secondary">
                            <span>🗑️</span>
                            清空显示
                        </button>
                    </div>
                </div>
                <div class="card-body">
                    <div id="logsContainer" class="logs-container">
                        <div class="loading">加载中...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <button id="backToTopBtn" class="back-to-top" aria-label="返回顶部">↑</button>
    <script src="/static/js/common.js?v=6"></script>
    <script src="/static/js/logs.js?v=2"></script>
</body>
</html>
