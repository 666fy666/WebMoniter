name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: fengyu666/webmoniter

jobs:
  # 精简与完整分两个 job，避免同一 runner 上连续 build-push 时 Buildx/GHA 缓存层被错误复用，导致 latest 与 full digest 相同
  docker-slim:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Verify Docker Hub secrets
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          if [ -z "$DOCKER_USERNAME" ] || [ -z "$DOCKER_PASSWORD" ]; then
            echo "::error::DOCKER_USERNAME / DOCKER_PASSWORD secrets must be set"
            exit 1
          fi

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (slim)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push slim
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=webmoniter-slim
          cache-to: type=gha,mode=max,scope=webmoniter-slim
          platforms: linux/amd64,linux/arm64

      - name: Digest (slim)
        run: echo "slim digest ${{ steps.build.outputs.digest }}"

  docker-full:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Verify Docker Hub secrets
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          if [ -z "$DOCKER_USERNAME" ] || [ -z "$DOCKER_PASSWORD" ]; then
            echo "::error::DOCKER_USERNAME / DOCKER_PASSWORD secrets must be set"
            exit 1
          fi

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (full)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},suffix=-full
            type=semver,pattern={{major}}.{{minor}},suffix=-full
            type=semver,pattern={{major}},suffix=-full
            type=raw,value=full

      - name: Build and push full
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.full
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=webmoniter-full
          cache-to: type=gha,mode=max,scope=webmoniter-full
          platforms: linux/amd64,linux/arm64

      - name: Digest (full)
        run: echo "full digest ${{ steps.build.outputs.digest }}"

  verify-hub-tags:
    needs: [docker-slim, docker-full]
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Wait for Hub manifests (eventual consistency)
        run: sleep 30

      - name: Pull and assert slim ≠ full (Chromium)
        env:
          IMG: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          set -eux
          docker pull "$IMG:latest"
          docker pull "$IMG:full"
          # 精简镜像不应带系统 Chromium
          docker run --rm --entrypoint sh "$IMG:latest" -c 'if test -x /usr/bin/chromium; then echo "::error::slim image incorrectly contains /usr/bin/chromium"; exit 1; fi'
          # 完整镜像必须带 Chromium
          docker run --rm --entrypoint sh "$IMG:full" -c 'test -x /usr/bin/chromium'
