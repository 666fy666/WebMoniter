name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*'  # 只在推送版本 tag 时触发
  workflow_dispatch:  # 允许手动触发

env:
  REGISTRY: docker.io
  IMAGE_NAME: fengyu666/webmoniter

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify Docker Hub secrets
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          if [ -z "$DOCKER_USERNAME" ]; then
            echo "::error::DOCKER_USERNAME secret is not set"
            exit 1
          fi
          if [ -z "$DOCKER_PASSWORD" ]; then
            echo "::error::DOCKER_PASSWORD secret is not set"
            exit 1
          fi
          echo "Docker Hub secrets are configured"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 精简镜像（./Dockerfile）：latest 与 semver 主标签
      - name: Extract metadata (slim)
        id: meta_slim
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push slim image
        id: build_slim
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta_slim.outputs.tags }}
          labels: ${{ steps.meta_slim.outputs.labels }}
          cache-from: type=gha,scope=slim
          cache-to: type=gha,mode=max,scope=slim
          platforms: linux/amd64,linux/arm64

      # 完整镜像（./Dockerfile.full）：标签 full 与 *-full
      - name: Extract metadata (full)
        id: meta_full
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},suffix=-full
            type=semver,pattern={{major}}.{{minor}},suffix=-full
            type=semver,pattern={{major}},suffix=-full
            type=raw,value=full

      - name: Build and push full image
        id: build_full
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.full
          push: true
          tags: ${{ steps.meta_full.outputs.tags }}
          labels: ${{ steps.meta_full.outputs.labels }}
          cache-from: type=gha,scope=full
          cache-to: type=gha,mode=max,scope=full
          platforms: linux/amd64,linux/arm64

      - name: Image digests
        run: |
          echo "slim: ${{ steps.build_slim.outputs.digest }}"
          echo "full: ${{ steps.build_full.outputs.digest }}"
